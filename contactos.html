<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap"

    />

  <body>

          <img id="logo" src="public/images/logo.png" alt="logo" />
          <h3 class="titulo">Recetas Faciles</h3>
          <div class="anchor links">
            <p><a href="index.html">Inicio</a></p>
            <p><a href="contactos.html">Contacto</a></p>

          <div class="redes">
            <a
              href="https://www.facebook.com/?locale=es_LA"

            >

            <a
              href="https://www.instagram.com/?hl=es"
              target="_blank"
              rel="noopener noreferrer"
            >

            <a

      <div class="redes">

        <a

          target="_blank"
          rel="noopener noreferrer"
          ><img
            src="public/images/instagram-1581266_1280.jpg"

        /></a>
        <a
          href="public/images/X_icon.svg.png"
